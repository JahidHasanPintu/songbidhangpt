version: "3.9"

services:
  backend:
    build: ./backend
    container_name: songbidhangpt-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - songbidhan_chroma:/app/data/chroma_db
      - songbidhan_pdfs:/app/data/pdfs
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: songbidhangpt-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  songbidhan_chroma:
  songbidhan_pdfs: